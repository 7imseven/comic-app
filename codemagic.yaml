workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Install deps
        script: npm install
      - name: Sync iOS
        script: chmod -R +x node_modules/.bin && npx cap sync ios
      - name: Install Pods
        script: |
          cd ios/App
          pod install
      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -archivePath $PWD/build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO
          mkdir -p /tmp/output
          xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportOptionsPlist /dev/stdin -exportPath /tmp/output <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>development</string></dict></plist>'
    artifacts:
      - /tmp/output/*.ipa
