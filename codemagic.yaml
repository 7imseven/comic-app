workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npx cap sync ios
      - name: Build IPA
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphoneos -configuration Release -archivePath /tmp/App.xcarchive archive
          xcodebuild -exportArchive -archivePath /tmp/App.xcarchive -exportOptionsPlist /dev/stdin -exportPath /tmp/output <<< '{"method":"development","teamID":""}'
    artifacts:
      - /tmp/output/*.ipa
